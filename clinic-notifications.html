<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — NovaBuk Clinic</title>
  <link rel="stylesheet" href="./clinic.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>



    .date-group {
      margin-top: 32px;
    }

    .date-label {
      display: flex;
      font-size: 14px;
      font-weight: 600;
      color: var(--light);
      margin-bottom: 16px;
      text-transform: capitalize;
    }


    .notif-icon-circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    /* Icon Types */
    .icon-critical { background: var(--critical-bg); color: var(--critical-icon); }
    .icon-waiting { background: var(--waiting-bg); color: var(--waiting-icon); }
    .icon-new { background: var(--new-bg); color: var(--new-icon); }

    .notif-info {
      flex: 1;
    }


    .staff-avatar-top {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--teal-pale);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      border: 1px solid var(--border);
    }

    .empty-state {
      padding: 100px 0;
      text-align: center;
      color: var(--light);
    }
  </style>
</head>

<body>

  <header>
    <div class="notif-left">
      <div class="bck-icon">
        <a href="./clinic-queue.html" class="btn-back" style="font-size: 24px; color: var(--text); text-decoration: none;">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
      </div>
      <div class="notify">
        <h3 class="topbar-title" style="font-size: 28px; font-weight: 700;">Notification</h3>
      </div>
    </div>

    <div class="top-side">
      <div class="topbar-actions">
        <!-- Search shortcut -->
        <a href="./clinic-search.html" class="topbar-btn" title="Search patients">
          <i class="fa-solid fa-magnifying-glass"></i>
        </a>
        <!-- Notification bell -->
        <a href="./clinic-notifications.html" class="topbar-btn active" title="Notifications">
          <i class="fa-solid fa-bell"></i>
          <span class="notification-badge" id="topbarNotificationBadge"></span>
        </a>

        <!-- Staff chip — shows name + dropdown -->
        <div class="staff-chip" id="staffChip" onclick="toggleStaffMenu(event)">
          <div class="staff-avatar-sm" id="topbarAvatar">?</div>
          <span class="staff-name-sm staff-name">Staff</span>
          <i class="fa-solid fa-angle-down" style=""></i>

          <div class="staff-dropdown" id="staffDropdown">
            <div class="staff-dropdown-item" onclick="window.location.href='./clinic-settings.html'">
              <i class="fa-solid fa-gear"></i> Settings
            </div>
            <div class="staff-dropdown-item danger" onclick="clinicLogout()">
              <i class="fa-solid fa-right-from-bracket"></i> Logout
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="all-content">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-icon">
        <a href="./clinic-queue.html" class="sidebar-nav-btn" data-tip="Today's Queue">
          <i class="fa-solid fa-list-check"></i>
        </a>
        <a href="./clinic-search.html" class="sidebar-nav-btn" data-tip="Search Patients">
          <i class="fa-solid fa-magnifying-glass"></i>
        </a>
        <a href="./clinic-settings.html" class="sidebar-nav-btn" data-tip="Settings">
          <i class="fa-solid fa-gear"></i>
        </a>
      </div>
      <div class="logout-sidebar">
        <button class="sidebar-nav-btn sidebar-logout" data-tip="Logout" onclick="clinicLogout()">
          <i class="fa-solid fa-right-from-bracket"></i>
        </button>
      </div>
    </aside>
  </div>

    <div class="main">
      
      
      <div class="content" id="notifList">
        
        <div style="text-align:center; padding:40px;">
          <i class="fa-solid fa-spinner fa-spin" style="font-size:24px; color:var(--teal);"></i>
          
        </div>
        
      </div>
      
    </div>
  </div>

  <script src="./clinic-shared.js"></script>
  <script>
    const API_BASE = "http://localhost:5000/api";

    async function loadNotifications() {
      try {
        const res = await clinicFetch(`${API_BASE}/notifications`);
        const data = await res.json();
        renderNotifications(data.data || []);
      } catch (err) {
        document.getElementById("notifList").innerHTML = `<div class="empty-state">Failed to load notifications.</div>`;
      }
    }

    function renderNotifications(notifs) {
      const container = document.getElementById("notifList");
      if (!notifs.length) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fa-regular fa-bell-slash"></i>
            <p>No notifications yet</p>
          </div>`;
        return;
      }

      // Group by date
      const groups = {};
      notifs.forEach(n => {
        const date = new Date(n.createdAt);
        const today = new Date();
        const yesterday = new Date();
        yesterday.setDate(today.getDate() - 1);

        let label = formatDate(date);
        if (date.toDateString() === today.toDateString()) label = "Today";
        else if (date.toDateString() === yesterday.toDateString()) label = "Yesterday";

        if (!groups[label]) groups[label] = [];
        groups[label].push(n);
      });

      let html = "";
      for (const label in groups) {
        html += `<div class="date-group">
          <div class="date-label">${label} <div style="margin-left: auto;">
        <button class="btn-mark-all" style="color: var(--mid); border: none; background: none; cursor: pointer; font-size: 13px;font-family: 'poppins', sans-serif; font-weight: 500;" onclick="markAllRead()">Mark all as read</button>
      </div></div>
          ${groups[label].map(n => renderCard(n)).join("")}
        </div>`;
      }
      container.innerHTML = html;
    }

    function renderCard(n) {
      const type = getNotifType(n);
      const action = getActionInfo(n);
      
      return `
        <div class="notif-card ${n.read ? '' : 'unread'}" onclick="handleNotifClick('${n._id}', '${n.link || action.link}')">
          <div class="notif-icon-circle icon-${type.class}">
            <i class="fa-solid ${type.icon}"></i>
          </div>
          <div class="notif-info">
            <div class="notif-header">
              <div class="notif-title">${n.title}</div>
              <div class="notif-time">${formatTime(n.createdAt)}</div>
            </div>
            <div class="notif-desc">${n.message}</div>
          </div>
          <div class="notif-action">
            <button class="btn-action">${action.label}</button>
          </div>
        </div>
      `;
    }

    function getNotifType(n) {
      const t = (n.type || "").toLowerCase();
      const title = (n.title || "").toLowerCase();
      const msg = (n.message || "").toLowerCase();
      
      // Operational / Waiting alerts (Check this first so they stay Orange)
      if (t.includes("waiting") || title.includes("waiting") || msg.includes("waiting") || msg.includes("overdue") || msg.includes("delayed")) {
        return { class: "waiting", icon: "fa-clock" };
      }

      // Clinical / Critical alerts (BP, Emergency, etc) - Red
      if (t.includes("critical") || title.includes("alert") || msg.includes("mmHg") || msg.includes("critical")) {
        return { class: "critical", icon: "fa-circle-exclamation" };
      }
      
      // Registration / Walk-in - Green
      if (t.includes("registered") || t.includes("walk_in") || msg.includes("added to the queue") || title.includes("walk-in")) {
        return { class: "new", icon: "fa-user-plus" };
      }
      // Default / System
      return { class: "new", icon: "fa-bell" };
    }

    function getActionInfo(n) {
      const title = (n.title || "").toLowerCase();
      const msg = (n.message || "").toLowerCase();
      
      if (msg.includes("mmHg") || title.includes("critical")) {
        return { label: "Open Consultation", link: "./clinic-queue.html" };
      }
      if (msg.includes("waiting") || msg.includes("overdue")) {
        return { label: "Start Consultation", link: "./clinic-queue.html" };
      }
      if (msg.includes("queue") || msg.includes("walk-in")) {
        return { label: "View Queue", link: "./clinic-queue.html" };
      }
      return { label: "View Details", link: "" };
    }

    function getIcon(type) {
      if (type === 'visit_requested') return 'fa-calendar-plus';
      if (type === 'visit_cancelled') return 'fa-calendar-xmark';
      return 'fa-bell';
    }

    async function handleNotifClick(id, link) {
      try {
        await clinicFetch(`${API_BASE}/notifications/${id}/read`, { method: 'PATCH' });
        if (link) {
          window.location.href = link;
        } else {
          loadNotifications();
          updateNotificationBadge();
        }
      } catch (e) {
        if (link) window.location.href = link;
      }
    }

    async function markAllRead() {
      try {
        await clinicFetch(`${API_BASE}/notifications/mark-all-read`, { method: 'PATCH' });
        loadNotifications();
        updateNotificationBadge();
      } catch (e) { }
    }

    loadNotifications();
  </script>
</body>

</html>
