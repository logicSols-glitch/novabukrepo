<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./styles-app.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&family=Unbounded:wght@200..900&display=swap"
      rel="stylesheet"
    />
    <title>Visit History — NovaBuk</title>
    <style>
      .history-wrap {
        max-width: 720px;
        margin: 32px auto;
        padding: 0 24px 60px;
      }

      /* ── TABS ── */
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
        border-bottom: 2px solid #e2e8f0;
        padding-bottom: 0;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .tabs::-webkit-scrollbar { display: none; }
      .tab-btn {
        padding: 10px 20px;
        border: none;
        background: none;
        font-family: 'Poppins', sans-serif;
        font-size: 14px;
        font-weight: 500;
        color: #718096;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
        transition: all 0.2s;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .tab-btn.active { color: #35bac9; border-bottom-color: #35bac9; font-weight: 600; }
      .tab-btn:hover  { color: #35bac9; }

      @media (max-width: 600px) {
        .history-wrap { padding: 0 12px 40px; margin: 16px auto; }
        .tab-btn { padding: 8px 14px; font-size: 13px; }
        .visit-card { padding: 16px; }
        .visit-top { flex-direction: column; gap: 8px; }
        .status-pill { align-self: flex-start; }
        .visit-meta { gap: 10px; flex-direction: column; }
        .visit-actions { justify-content: flex-start; }
        .btn-cancel-visit { width: 100%; text-align: center; }
      }

      /* ── VISIT CARD ── */
      .visit-card {
        background: white;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        padding: 20px 24px;
        margin-bottom: 16px;
        transition: box-shadow 0.2s;
      }
      .visit-card:hover { box-shadow: 0 4px 20px rgba(53,186,201,0.1); }

      .visit-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 12px;
        gap: 12px;
        flex-wrap: wrap;
      }

      .visit-clinic-name {
        font-size: 15px;
        font-weight: 600;
        color: #0f2027;
      }

      .visit-clinic-address {
        font-size: 12px;
        color: #718096;
        margin-top: 3px;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .status-pill {
        font-size: 11px;
        font-weight: 700;
        padding: 4px 12px;
        border-radius: 20px;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .status-Pending   { background: #fef3c7; color: #92400e; }
      .status-Confirmed { background: #d1fae5; color: #065f46; }
      .status-Completed { background: #dbeafe; color: #1e40af; }
      .status-Cancelled { background: #fee2e2; color: #991b1b; }

      .visit-meta {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        font-size: 12px;
        color: #718096;
        margin-bottom: 12px;
      }
      .visit-meta span { display: flex; align-items: center; gap: 5px; }

      .visit-notes {
        font-size: 13px;
        color: #4a5568;
        background: #f7fafc;
        border-radius: 8px;
        padding: 10px 14px;
        margin-bottom: 12px;
        border-left: 3px solid #35bac9;
      }

      .clinic-notes {
        font-size: 13px;
        color: #4a5568;
        background: #fffbeb;
        border-radius: 8px;
        padding: 10px 14px;
        margin-bottom: 12px;
        border-left: 3px solid #f6ad55;
      }
      .clinic-notes strong { color: #92400e; }

      .visit-symptoms {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 12px;
      }
      .symptom-chip {
        font-size: 11px;
        background: #e8f8fb;
        color: #1e9aaa;
        padding: 3px 10px;
        border-radius: 20px;
        font-weight: 500;
      }

      .visit-actions { display: flex; gap: 10px; justify-content: flex-end; }

      .btn-cancel-visit {
        font-size: 12px;
        padding: 7px 16px;
        border: 1px solid #fed7d7;
        background: white;
        color: #e53e3e;
        border-radius: 8px;
        cursor: pointer;
        font-family: 'Poppins', sans-serif;
        font-weight: 500;
        transition: all 0.2s;
      }
      .btn-cancel-visit:hover { background: #fff5f5; }

      /* ── EMPTY STATE ── */
      .empty-state {
        background: white;
        border-radius: 15px;
        padding: 80px 20px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .empty-state img { width: 120px; margin-bottom: 20px; opacity: 0.7; }
      .empty-state p { color: #718096; font-size: 15px; margin-bottom: 20px; }
      .btn-find-clinic {
        display: inline-block;
        padding: 12px 28px;
        background: #35bac9;
        color: white;
        border-radius: 10px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        font-family: 'Poppins', sans-serif;
      }

      /* ── SPINNER ── */
      .spinner {
        width: 36px; height: 36px;
        border: 3px solid #e8f8fb;
        border-top-color: #35bac9;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 60px auto;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── CANCEL MODAL ── */
      .modal-overlay {
        display: none;
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.45);
        z-index: 999;
        justify-content: center;
        align-items: center;
      }
      .modal-overlay.show { display: flex; }
      .modal-box {
        background: white;
        border-radius: 12px;
        padding: 28px 24px;
        width: 90%; max-width: 340px;
        text-align: center;
        font-family: 'Poppins', sans-serif;
      }
      .modal-box p { font-size: 14px; color: #444; margin-bottom: 20px; }
      .modal-btns { display: flex; gap: 10px; }
      .modal-btns button {
        flex: 1; padding: 11px;
        border-radius: 8px; border: none;
        font-family: 'Poppins', sans-serif;
        font-size: 14px; font-weight: 600;
        cursor: pointer;
      }
      .btn-confirm-cancel { background: #e53e3e; color: white; }
      .btn-keep           { background: #eee; color: #333; }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="navbar">
        <div class="logo"><img src="./images/logo.png" alt="" /></div>
        <button id="navToggle" class="nav-toggle" aria-label="Toggle navigation">
          <i class="fas fa-bars"></i>
        </button>
        <div class="nav-menu" id="navMenu">
          <ul>
            <li><a href="./app-home.html">Home</a></li>
            <li><a href="./complaints.html">Symptoms Logging</a></li>
            <li><a href="./app-clinics.html">Clinic Directory</a></li>
            <li><a href="./app-history.html" class="active">History</a></li>
          </ul>
        </div>
        <div class="nav-buttons">
          <ul>
            <li><a href="./profile-health.html"><i class="fa-solid fa-user"></i></a></li>
            <li><a href="./app-history.html"><i class="fa-regular fa-bell"></i></a></li>
            <li>
              <div class="user-profile" id="userProfileBtn">
                <span class="dropdown-arrow">▼</span>
                <div class="dropdown-menu" id="settingsDropdown">
                  <div class="dropdown-item" onclick="handleMenuSelect('profile')"><span>👤</span> Profile</div>
                  <div class="dropdown-item" onclick="handleMenuSelect('settings')"><span>⚙️</span> Settings</div>
                  <hr>
                  <div class="dropdown-item logout" onclick="handleMenuSelect('logout')"><span>↪️</span> Logout</div>
                </div>
              </div>
            </li>
          </ul>
        </div>
      </div>
    </div>

    <main class="main">
      <div class="hero-app">
        <h1>Your Visits</h1>
      </div>

      <div class="history-wrap">
        <!-- Tabs -->
        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('all', this)">All</button>
          <button class="tab-btn" onclick="switchTab('Pending', this)">Pending</button>
          <button class="tab-btn" onclick="switchTab('Confirmed', this)">Confirmed</button>
          <button class="tab-btn" onclick="switchTab('Completed', this)">Completed</button>
          <button class="tab-btn" onclick="switchTab('Cancelled', this)">Cancelled</button>
        </div>

        <!-- Visit list -->
        <div id="visitsList"></div>
      </div>
    </main>

    <!-- Cancel confirmation modal -->
    <div class="modal-overlay" id="cancelModal">
      <div class="modal-box">
        <p>Are you sure you want to cancel this visit request?</p>
        <div class="modal-btns">
          <button class="btn-confirm-cancel" id="confirmCancelBtn">Yes, Cancel</button>
          <button class="btn-keep" onclick="closeCancelModal()">Keep it</button>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
    <script>
      const API_URL = "http://localhost:5000/api";
      // const API_URL = "https://novabuk-backend.onrender.com/api";

      const token = localStorage.getItem("novabuk_token");
      if (!token) window.location.href = "./sign-in.html";

      let allVisits    = [];
      let activeTab    = "all";
      let cancellingId = null;

      // ── DROPDOWN ────────────────────────────────────────
      function handleMenuSelect(value) {
        if (value === "logout") {
          localStorage.removeItem("novabuk_token");
          localStorage.removeItem("novabuk_user");
          window.location.href = "./sign-in.html";
        } else if (value === "profile") {
          window.location.href = "./app-setting.html?tab=profile";
        } else if (value === "settings") {
          window.location.href = "./app-setting.html?tab=privacy";
        }
      }

      // ── TABS ────────────────────────────────────────────
      function switchTab(tab, btn) {
        activeTab = tab;
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        renderVisits();
      }

      // ── LOAD VISITS ─────────────────────────────────────
      async function loadVisits() {
        document.getElementById("visitsList").innerHTML = '<div class="spinner"></div>';
        try {
          const res  = await fetch(`${API_URL}/visits/my`, {
            headers: { Authorization: `Bearer ${token}` }
          });
          const data = await res.json();
          if (data.success) {
            allVisits = data.data;
            renderVisits();
          } else {
            document.getElementById("visitsList").innerHTML =
              `<p style="text-align:center;color:#718096;padding:40px">Could not load visits.</p>`;
          }
        } catch (err) {
          document.getElementById("visitsList").innerHTML =
            `<p style="text-align:center;color:#e53e3e;padding:40px">Network error. Please try again.</p>`;
        }
      }

      // ── RENDER ───────────────────────────────────────────
      function renderVisits() {
        const list = document.getElementById("visitsList");
        const filtered = activeTab === "all"
          ? allVisits
          : allVisits.filter(v => v.status === activeTab);

        if (filtered.length === 0) {
          list.innerHTML = `
            <div class="empty-state">
              <img src="images/history.png" alt="No visits" />
              <p>${activeTab === "all"
                ? "You have not made any clinic visit yet"
                : `No ${activeTab.toLowerCase()} visits`}
              </p>
              ${activeTab === "all"
                ? `<a href="./app-clinics.html" class="btn-find-clinic">Find a Clinic</a>`
                : ""}
            </div>`;
          return;
        }

        list.innerHTML = filtered.map(visit => {
          const clinic     = visit.clinic || {};
          const date       = visit.preferredDate
            ? new Date(visit.preferredDate).toLocaleDateString("en-NG", { weekday:"short", day:"numeric", month:"short", year:"numeric", hour:"2-digit", minute:"2-digit" })
            : "No preferred date";
          const created    = new Date(visit.createdAt).toLocaleDateString("en-NG", { day:"numeric", month:"short", year:"numeric" });
          const symptoms   = visit.symptomLog?.tags || [];

          return `
            <div class="visit-card">
              <div class="visit-top">
                <div>
                  <div class="visit-clinic-name">${clinic.name || "Unknown Clinic"}</div>
                  <div class="visit-clinic-address">
                    <i class="fa-solid fa-location-dot"></i>
                    ${clinic.location ? `${clinic.location.address}, ${clinic.location.city}` : "—"}
                  </div>
                </div>
                <span class="status-pill status-${visit.status}">${visit.status}</span>
              </div>

              <div class="visit-meta">
                <span><i class="fa-regular fa-calendar"></i> Preferred: ${date}</span>
                <span><i class="fa-regular fa-clock"></i> Requested: ${created}</span>
              </div>

              ${symptoms.length ? `
                <div class="visit-symptoms">
                  ${symptoms.map(s => `<span class="symptom-chip">${s}</span>`).join("")}
                </div>` : ""}

              ${visit.notes ? `
                <div class="visit-notes">
                  <strong>Your notes:</strong> ${visit.notes}
                </div>` : ""}

              ${visit.clinicNotes ? `
                <div class="clinic-notes">
                  <strong>Clinic response:</strong> ${visit.clinicNotes}
                </div>` : ""}

              ${visit.status === "Pending" ? `
                <div class="visit-actions">
                  <button class="btn-cancel-visit" onclick="openCancelModal('${visit._id}')">
                    <i class="fa-solid fa-xmark"></i> Cancel Request
                  </button>
                </div>` : ""}
            </div>`;
        }).join("");
      }

      // ── CANCEL VISIT ─────────────────────────────────────
      function openCancelModal(visitId) {
        cancellingId = visitId;
        document.getElementById("cancelModal").classList.add("show");
        document.getElementById("confirmCancelBtn").onclick = confirmCancel;
      }

      function closeCancelModal() {
        cancellingId = null;
        document.getElementById("cancelModal").classList.remove("show");
      }

      async function confirmCancel() {
        if (!cancellingId) return;
        document.getElementById("confirmCancelBtn").textContent = "Cancelling...";
        document.getElementById("confirmCancelBtn").disabled = true;

        try {
          const res  = await fetch(`${API_URL}/visits/${cancellingId}/cancel`, {
            method: "PATCH",
            headers: { Authorization: `Bearer ${token}` }
          });
          const data = await res.json();
          closeCancelModal();
          if (data.success) {
            // Update status locally without reloading
            const visit = allVisits.find(v => v._id === cancellingId);
            if (visit) visit.status = "Cancelled";
            renderVisits();
          } else {
            alert(data.message || "Could not cancel visit.");
          }
        } catch (err) {
          alert("Network error. Please try again.");
          closeCancelModal();
        }
      }

      // ── INIT ────────────────────────────────────────────
      loadVisits();
    </script>
  </body>
</html>
