<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaBuk - Privacy Settings</title>
    <link rel="stylesheet" href="./app-setting.css">

    
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <span class="icon">🛡️</span> NovaBuk
        </div>
        <nav class="nav-links">
            <a href="#">Home</a>
            <a href="#">Symptom Logging</a>
            <a href="#">Clinic Directory</a>
            <a href="#">History</a>
        </nav>
        <div class="user-profile" id="userProfileBtn">
    <span class="user-icon">👤</span>
    <span class="dropdown-arrow">▼</span>
    
    <div class="dropdown-menu" id="settingsDropdown">
        <div class="dropdown-item" onclick="handleMenuSelect('profile')">
            <span>👤</span> Profile
        </div>
        <div class="dropdown-item" onclick="handleMenuSelect('settings')">
            <span>⚙️</span> Settings
        </div>
        <hr>
        <div class="dropdown-item logout" onclick="handleMenuSelect('logout')">
            <span>↪️</span> Logout
        </div>
    </div>
</div>
    </header>

    <main class="container">
        <aside class="sidebar">
            <ul>
                <li>Profile</li>
                <li class="active">Privacy</li>
                <li>Notification</li>
                <li>Change Password</li>
                <li>Logout</li>
            </ul>
        </aside>

        <section class="content">
            <div class="settings-card" id="main-content-wrapper">
            </div>
        </section>

        <div class="modal-overlay" id="logout-modal">
    <div class="modal">
        <p>Are you sure you want to logout?</p>
        <div class="modal-btns">
            <button class="btn-logout" onclick="location.reload()">Logout</button>
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>
    </main>

    <script>
        function handleMenuSelect(value) {
            if (value === "logout") {
                localStorage.removeItem("novabuk_token");
                window.location.href = "./sign-in.html";
            } else if (value === "settings") {
                window.location.href = "./app-settings.html?tab=privacy";
            } else if (value === "profile") {
                window.location.href = "./app-settings.html?tab=profile";
            }
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
