<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <link rel="stylesheet" href="./styles.css" /> -->
    <link rel="stylesheet" href="./styles-app.css" />
    <link rel="stylesheet" href="./app-setting.css">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Unbounded:wght@200..900&display=swap"
      rel="stylesheet"
    />
    <title>Settings NovaBuk</title>
  </head>
<body class="app-page">
    <div class="header">
      <div class="navbar">
        
        <button id="navToggle" class="nav-toggle" aria-label="Toggle navigation">
          <i class="fas fa-bars"></i>
        </button>
        <div class="logo"><img src="./images/logo.png" alt="" /></div>

        <!-- <button id="navToggle" class="nav-toggle" aria-label="Toggle navigation">
          <i class="fas fa-bars"></i>
        </button> -->

        <div class="nav-menu" id="navMenu">
          <ul>
            <li><a href="./app-home.html" class="active">Home</a></li>
            <li><a href="./complaints.html">Symptoms Logging</a></li>
            <li><a href="./app-clinics.html">Clinic Directory</a></li>
            <li><a href="./app-history.html">History</a></li>
          </ul>
        </div>
        <div class="nav-buttons">
          <ul>
            <li>
              <a href="./app-setting.html?tab=profile">
                <i class="fa-solid fa-user"></i>
              </a>
            </li>
            <li>
              <a href="./app-history.html">
                <i class="fa-regular fa-bell"></i>
              </a>
            </li>
            <li>
              <div class="user-profile" id="userProfileBtn">
                <div class="profile-check"><span><div class="nav-avatar" style="font-size: 1.5em; font-family:'poppins',san-serif;" id="navAvatar"></div></span>
                <span class="dropdown-arrow"><i class="fa-solid fa-angle-down"></i></span></div>
                <div class="dropdown-menu" id="settingsDropdown">
                  <!-- User identity block -->
                  <div class="dd-user-block">
                    <div class="dd-avatar-sm" id="ddAvatar"></div>
                    <div class="dd-user-info">
                      <p class="dd-name" id="ddName">—</p>
                      <p class="dd-email" id="ddEmail">—</p>
                    </div>
                  </div>
                  <div class="dd-divider"></div>
                  <!-- Quick actions -->
                  <div class="dropdown-item" onclick="handleMenuSelect('dashboard')">
                    <span><i class="fa-solid fa-house"></i></span> Dashboard
                  </div>
                  <div class="dropdown-item" onclick="handleMenuSelect('visits')">
                    <span><i class="fa-solid fa-calendar-check"></i></span>
                    My Visits
                    <span class="dd-visits-badge" id="ddVisitsBadge" style="display:none"></span>
                  </div>
                  <div class="dropdown-item" onclick="handleMenuSelect('profile')">
                    <span><i class="fa-solid fa-heart-pulse"></i></span> My Health Profile
                  </div>
                  <div class="dd-symptom-hint" id="ddSymptomHint" style="display:none">
                    <i class="fa-regular fa-clock"></i>
                    <span id="ddSymptomText">Last symptom logged: —</span>
                    <a href="./complaints.html" class="dd-log-now">Log now →</a>
                  </div>
                  <div class="dd-divider"></div>
                  <div class="dropdown-item" onclick="handleMenuSelect('settings')">
                    <span><i class="fa-solid fa-gear"></i></span> Settings
                  </div>
                  <div class="dd-divider"></div>
                  <div class="dropdown-item dd-logout" onclick="handleMenuSelect('logout')">
                    <span><i class="fa-solid fa-right-from-bracket"></i></span> Logout
                  </div>
                </div>
              </div>
            </li>
          </ul>
        </div>
        
      </div>
    </div>

    <main class="container-setting">
        <aside class="sidebar">
            <ul>
              <li>Profile</li>
              <li class="active">Privacy</li>
              <li>Notification</li>
              <li>Change Password</li>
              <li onclick="showLogoutModal()" style="cursor:pointer">Logout</li>
            </ul>
        </aside>

        <section class="content">
    <button class="mobile-back-btn" id="mobileBackBtn" onclick="goBackToMenu()"style="display: none;">
        <i class="fa-solid fa-chevron-left" ></i> Back to Settings
    </button>

    <div class="settings-card" id="main-content-wrapper">
        </div>
</section>

<!-- Logout modal handled globally by script.js -->
    </main>

    <!-- avatar + handleMenuSelect handled globally by script.js initAppNav() -->
    <script src="app.js"></script>
    <script src="./script.js"></script>
</body>
</html>
