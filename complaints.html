      rel="stylesheet"
    />

  </head>

  <body>
    <div class="header">
      <div class="navbar">
        <div class="logo"><img src="./images/logo.png" alt="" /></div>

        <button
          id="navToggle"
          class="nav-toggle"
          aria-label="Toggle navigation"
        >
          <i class="fas fa-bars"></i>
        </button>

        <div class="nav-menu" id="navMenu">
          <ul>
            <li><a href="./app-home.html">Home</a></li>
            <li>
              <a href="./complaints.html" class="active">Symptoms Logging</a>
            </li>
            <li><a href="./services.html">Clinic Directory</a></li>
            <li><a href="./blog-dynamic.html">History</a></li>
            <!-- <li><a href="./contact.html">Contact</a></li> -->
          </ul>
        </div>
        <div class="nav-buttons">
          <ul>
            <li>
              <a href="./services.html"><i class="fa-solid fa-user"></i></a>
            </li>
            <li>
              <a href="./blog-dynamic.html"
                ><i class="fa-regular fa-bell"></i
              ></a>
            </li>
            <li>
              <select name="" id="">
                <option value=""></option>
                <a href="#"><option value="">Settings</option></a>
                <a href="#"><option value="">Logout</option></a>
                <a href="#"><option value="">Profile</option></a>
              </select>
            </li>
          </ul>
        </div>
      </div>
    </div>
    <main class="main">
      <div class="hero-app">
        <div class="hero-app">
          <h1>What symptoms are you experiencing ?</h1>
        </div>
      </div>
      <div class="main-body">
        <form action="" id="form">
          <label for="symptoms">Describe how you feel</label>
          <textarea
            name="symptoms"
            id="symptoms"
            cols="30"
            rows="10"
            placeholder="Describe your symptoms here..."
          ></textarea>
          <p>Select all that apply</p>
          <div class="symptoms-options">
            <label
              ><input
                type="checkbox"
                name="symptom"
                value="fever"
                class="round-checkbox"
              />
              Fever</label
            >
            <label
              ><input
                type="checkbox"
                name="symptom"
                value="cough"
                class="round-checkbox"
              />
              Cough</label
            >
            <label
              ><input
                type="checkbox"
                name="symptom"
                value="fatigue"
                class="round-checkbox"
              />
              Fatigue</label
            >
            <label
              ><input
                type="checkbox"
                name="symptom"
                value="headache"
                class="round-checkbox"
              />
              Headache</label
            >
            <label
              ><input
                type="checkbox"
                name="symptom"
                value="nausea"
                class="round-checkbox"
              />
              Nausea</label
            >
            <label
              ><input
                type="checkbox"
                name="symptom"
                value="Other"
                class="round-checkbox"
              />
              Other</label
            >
          </div>
          <button type="submit" class="btn-primary">Submit Symptoms</button>
        </form>
        <div class="hero-detail">
          <div class="hero-box">
            <h4>Novabuk does not replace professional advice</h4>
          </div>
        </div>
      </div>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
