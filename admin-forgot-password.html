<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./styles-app.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Admin Forgot Password — NovaBuk</title>
    <style>
      :root { --primary: #35bac9; }
      body { font-family: 'Poppins', sans-serif; background: #f0f4f8; }
      p { font-size: 14px; color: #718096; margin-bottom: 24px; line-height: 1.6; }
      .forgot-box { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
      .forgot-input { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 440px; text-align: center; }
      .forgot-logo { display: flex; align-items: center; justify-content: center; gap: 5px; margin-bottom: 30px; }
      /* .forgot-logo img { height: 40px; } */
      .logo{width: 20%;}
      .forgot-logo p { font-size: 22px; font-weight: 700; color: #1a1a1a;margin: auto 0px;}
      .icon-circle { width: 64px; height: 64px; background: #e8f8fb; color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 20px; }
      h4 { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
      .login-form { text-align: left; margin-bottom: 24px; }
      .login-form label { display: block; font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 8px; }
      .login-form span { position: relative; display: block; }
      .login-form i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 14px; }
      .login-form input { width: 100%; padding: 12px 14px 12px 40px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; font-family: inherit; font-size: 14px; transition: border-color 0.2s; }
      .login-form input:focus { border-color: var(--primary); }
      button { width: 100%; padding: 13px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; transition: opacity 0.2s; }
      button:hover { opacity: 0.9; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .back-link { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 24px; color: var(--primary); text-decoration: none; font-size: 14px; font-weight: 500; }
      .error-msg { color: #e53e3e; font-size: 13px; margin-bottom: 16px; padding: 10px; background: #fff5f5; border-radius: 8px; border: 1px solid #fed7d7; display: none; }
      .error-msg.show { display: block; }
    </style>
  </head>
  <body>
    <div class="forgot-box">
      <div class="forgot-input">
        <div class="forgot-logo">
          <div class="logo"><img src="./images/logo.png" alt="logo" /></div>
          <p>NovaBuk</p>
        </div>

        <div class="icon-circle">
          <i class="fa-solid fa-unlock"></i>
        </div>
        <h4>Forgot Password?</h4>
        <p>Enter your admin email address and we'll send you a link to reset your password.</p>

        <div class="error-msg" id="errorMsg"></div>

        <form onsubmit="handleForgotPassword(event)">
          <div class="login-form">
            <label for="forgotEmail">Admin Email:</label>
            <span>
              <i class="fa fa-envelope"></i>
              <input type="email" id="forgotEmail" placeholder="admin@novabuk.com" required />
            </span>
          </div>
          <button type="submit" id="forgotBtn">Send Reset Link</button>
        </form>

        <a href="./admin-dashboard.html" class="back-link">
          <i class="fa fa-arrow-left"></i> Back to Login
        </a>
      </div>
    </div>

    <script>
      var API_URL = "http://localhost:5000/api";

      async function handleForgotPassword(e) {
        e.preventDefault();
        const email = document.getElementById("forgotEmail").value.trim();
        const btn = document.getElementById("forgotBtn");
        const errMsg = document.getElementById("errorMsg");

        errMsg.classList.remove("show");
        btn.disabled = true;
        btn.textContent = "Sending...";

        try {
          const res = await fetch(`${API_URL}/admin/forgot-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });

          // Redirect to success state regardless of email existence (security)
          window.location.href = `./send-email.html?email=${encodeURIComponent(email)}&type=admin`;

        } catch (err) {
          errMsg.textContent = "Network error. Please try again.";
          errMsg.classList.add("show");
          btn.disabled = false;
          btn.textContent = "Send Reset Link";
        }
      }
    </script>
  </body>
</html>
