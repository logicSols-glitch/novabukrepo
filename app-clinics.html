<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinic Directory — NovaBuk</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:       #35bac9;
      --teal-light: #7ecad7;
      --teal-pale:  #e8f8fb;
      --teal-dark:  #1e9aaa;
      --dark:       #0f2027;
      --mid:        #4a5568;
      --light:      #718096;
      --border:     #e2e8f0;
      --white:      #ffffff;
      --bg:         #f7fafc;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 12px rgba(0,0,0,0.06);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--teal-light), var(--teal));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .nav-logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--dark);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--light);
      font-size: 14px;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--teal);
      background: var(--teal-pale);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-avatar {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--teal-light), var(--teal));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      background: linear-gradient(135deg, var(--dark) 0%, #1a3a4a 100%);
      padding: 48px 24px 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .page-header::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 240px; height: 240px;
      background: radial-gradient(circle, rgba(53,186,201,0.15), transparent 70%);
      border-radius: 50%;
    }

    .page-header::after {
      content: '';
      position: absolute;
      bottom: -40px; left: -40px;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(126,202,215,0.1), transparent 70%);
      border-radius: 50%;
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      color: var(--white);
      margin-bottom: 8px;
      position: relative;
    }

    .page-header p {
      color: rgba(255,255,255,0.6);
      font-size: 15px;
      position: relative;
    }

    /* ── SEARCH BAR ── */
    .search-section {
      max-width: 720px;
      margin: -24px auto 0;
      padding: 0 24px;
      position: relative;
      z-index: 10;
    }

    .search-bar {
      background: var(--white);
      border-radius: 16px;
      padding: 6px 6px 6px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      border: 1px solid var(--border);
    }

    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--dark);
      background: transparent;
    }

    .search-bar input::placeholder { color: var(--light); }

    .search-btn {
      background: linear-gradient(135deg, var(--teal-light), var(--teal));
      border: none;
      color: white;
      padding: 10px 24px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .search-btn:hover { opacity: 0.9; }

    /* ── FILTERS ── */
    .filters-section {
      max-width: 960px;
      margin: 24px auto 0;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 13px;
      color: var(--light);
      font-weight: 500;
    }

    .filter-chip {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--mid);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-chip:hover,
    .filter-chip.active {
      border-color: var(--teal);
      color: var(--teal);
      background: var(--teal-pale);
    }

    /* ── MAIN CONTENT ── */
    .main {
      max-width: 960px;
      margin: 32px auto;
      padding: 0 24px 48px;
    }

    .results-count {
      font-size: 13px;
      color: var(--light);
      margin-bottom: 20px;
    }

    .results-count span {
      color: var(--teal);
      font-weight: 600;
    }

    /* ── CLINIC CARDS ── */
    .clinics-grid {
      display: grid;
      gap: 16px;
    }

    .clinic-card {
      background: var(--white);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 24px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 20px;
      align-items: start;
      cursor: pointer;
      transition: all 0.25s;
      text-decoration: none;
      color: inherit;
    }

    .clinic-card:hover {
      border-color: var(--teal-light);
      box-shadow: 0 8px 32px rgba(53,186,201,0.12);
      transform: translateY(-2px);
    }

    .clinic-icon {
      width: 56px;
      height: 56px;
      background: var(--teal-pale);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }

    .clinic-info { min-width: 0; }

    .clinic-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .clinic-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--dark);
    }

    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }

    .status-open {
      background: #d4edda;
      color: #155724;
    }

    .status-closed {
      background: #f8d7da;
      color: #721c24;
    }

    .clinic-location {
      font-size: 13px;
      color: var(--light);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .clinic-services {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .service-tag {
      font-size: 11px;
      color: var(--teal-dark);
      background: var(--teal-pale);
      padding: 3px 10px;
      border-radius: 6px;
      font-weight: 500;
    }

    .clinic-action {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-book {
      background: linear-gradient(135deg, var(--teal-light), var(--teal));
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .btn-book:hover { opacity: 0.9; }

    .btn-book:disabled {
      background: #e2e8f0;
      color: #a0aec0;
      cursor: not-allowed;
      opacity: 1;
    }

    .clinic-rating {
      font-size: 12px;
      color: var(--light);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .clinic-rating .stars { color: #f6ad55; }

    /* ── STATES ── */
    .state-container {
      text-align: center;
      padding: 80px 24px;
    }

    .state-icon {
      font-size: 56px;
      margin-bottom: 16px;
      display: block;
    }

    .state-container h3 {
      font-size: 20px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .state-container p {
      font-size: 14px;
      color: var(--light);
      max-width: 320px;
      margin: 0 auto;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--teal-pale);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .nav-links { display: none; }

      .clinic-card {
        grid-template-columns: auto 1fr;
        grid-template-rows: auto auto;
      }

      .clinic-action {
        grid-column: 1 / -1;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }

      .page-header h1 { font-size: 24px; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="./app-home.html" class="nav-logo">
      <div class="nav-logo-icon">🛡️</div>
      <span class="nav-logo-text">NovaBuk</span>
    </a>
    <ul class="nav-links">
      <li><a href="./app-home.html">Home</a></li>
      <li><a href="./app-symptoms.html">Symptom Logging</a></li>
      <li><a href="./app-clinics.html" class="active">Clinic Directory</a></li>
      <li><a href="./app-history.html">History</a></li>
    </ul>
    <div class="nav-right">
      <div class="nav-avatar" id="navAvatar">U</div>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <h1>Find a Clinic</h1>
    <p>Discover nearby healthcare providers and book your visit</p>
  </div>

  <!-- SEARCH -->
  <div class="search-section">
    <div class="search-bar">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="Search by clinic name or city..." />
      <button class="search-btn" onclick="handleSearch()">Search</button>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filters-section">
    <span class="filter-label">Filter:</span>
    <button class="filter-chip active" data-filter="all" onclick="handleFilter(this)">All Clinics</button>
    <button class="filter-chip" data-filter="open" onclick="handleFilter(this)">Open Now</button>
    <button class="filter-chip" data-filter="General Practice" onclick="handleFilter(this)">General Practice</button>
    <button class="filter-chip" data-filter="Lab Tests" onclick="handleFilter(this)">Lab Tests</button>
    <button class="filter-chip" data-filter="Mental Health" onclick="handleFilter(this)">Mental Health</button>
    <button class="filter-chip" data-filter="Dental" onclick="handleFilter(this)">Dental</button>
  </div>

  <!-- MAIN -->
  <main class="main">
    <p class="results-count" id="resultsCount"></p>
    <div class="clinics-grid" id="clinicsGrid">
      <!-- Populated by JS -->
    </div>
  </main>

  <script>
   // const API_URL = "https://novabuk-backend.onrender.com/api";
    const API_URL = "http://localhost:5000/api"; // ← uncomment for local testing

    let allClinics = [];
    let activeFilter = "all";
    let searchQuery = "";

    // ── AUTH GUARD ────────────────────────────────────────
    const token = localStorage.getItem("novabuk_token");
    const user  = JSON.parse(localStorage.getItem("novabuk_user") || "{}");

    if (!token) window.location.href = "./app-auth.html";

    // Set avatar initial
    if (user.fullName) {
      document.getElementById("navAvatar").textContent =
        user.fullName.charAt(0).toUpperCase();
    }

    // ── FETCH CLINICS ─────────────────────────────────────
    async function loadClinics(params = {}) {
      showLoading();

      try {
        const query = new URLSearchParams();
        if (params.search)  query.set("search",  params.search);
        if (params.service) query.set("service", params.service);
        if (params.isOpen)  query.set("isOpen",  params.isOpen);

        const res  = await fetch(`${API_URL}/clinics?${query.toString()}`);
        const data = await res.json();

        if (data.success) {
          allClinics = data.data;
          renderClinics(allClinics);
        } else {
          showError("Could not load clinics.");
        }
      } catch (err) {
        showError("Network error. Please check your connection.");
      }
    }

    // ── RENDER CLINICS ────────────────────────────────────
    function renderClinics(clinics) {
      const grid  = document.getElementById("clinicsGrid");
      const count = document.getElementById("resultsCount");

      if (clinics.length === 0) {
        count.innerHTML = "";
        grid.innerHTML = `
          <div class="state-container">
            <span class="state-icon">🏥</span>
            <h3>No clinics found</h3>
            <p>Try a different search term or filter.</p>
          </div>`;
        return;
      }

      count.innerHTML = `Showing <span>${clinics.length}</span> clinic${clinics.length !== 1 ? "s" : ""}`;

      grid.innerHTML = clinics.map(clinic => `
        <div class="clinic-card" onclick="bookClinic('${clinic._id}', '${escHtml(clinic.name)}')">
          <div class="clinic-icon">🏥</div>

          <div class="clinic-info">
            <div class="clinic-header">
              <span class="clinic-name">${escHtml(clinic.name)}</span>
              <span class="status-badge ${clinic.isOpen ? 'status-open' : 'status-closed'}">
                ${clinic.isOpen ? '● Open' : '● Closed'}
              </span>
            </div>
            <div class="clinic-location">
              📍 ${escHtml(clinic.location.address)}, ${escHtml(clinic.location.city)}
            </div>
            <div class="clinic-services">
              ${(clinic.services || []).slice(0, 4).map(s =>
                `<span class="service-tag">${escHtml(s)}</span>`
              ).join("")}
            </div>
          </div>

          <div class="clinic-action">
            ${clinic.numReviews > 0 ? `
              <div class="clinic-rating">
                <span class="stars">★</span>
                ${clinic.averageRating} (${clinic.numReviews})
              </div>` : ""}
            <button
              class="btn-book"
              onclick="event.stopPropagation(); bookClinic('${clinic._id}', '${escHtml(clinic.name)}')"
              ${!clinic.isOpen ? 'disabled title="This clinic is currently closed"' : ''}>
              ${clinic.isOpen ? 'Book Visit' : 'Closed'}
            </button>
          </div>
        </div>
      `).join("");
    }

    // ── BOOK A CLINIC ─────────────────────────────────────
    function bookClinic(clinicId, clinicName) {
      if (!clinicId) return;
      // Save selected clinic to localStorage
      localStorage.setItem("selectedClinic", JSON.stringify({
        id: clinicId,
        name: clinicName
      }));
      window.location.href = "./app-visit-request.html";
    }

    // ── SEARCH ────────────────────────────────────────────
    function handleSearch() {
      searchQuery = document.getElementById("searchInput").value.trim();
      applyFilters();
    }

    document.getElementById("searchInput").addEventListener("keydown", e => {
      if (e.key === "Enter") handleSearch();
    });

    // ── FILTER CHIPS ─────────────────────────────────────
    function handleFilter(el) {
      document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
      el.classList.add("active");
      activeFilter = el.dataset.filter;
      applyFilters();
    }

    function applyFilters() {
      const params = {};
      if (searchQuery)           params.search  = searchQuery;
      if (activeFilter === "open")   params.isOpen  = "true";
      if (activeFilter !== "all" && activeFilter !== "open")
                                 params.service = activeFilter;
      loadClinics(params);
    }

    // ── STATES ────────────────────────────────────────────
    function showLoading() {
      document.getElementById("resultsCount").innerHTML = "";
      document.getElementById("clinicsGrid").innerHTML = `
        <div class="state-container">
          <div class="spinner"></div>
          <p style="color:var(--light)">Loading clinics...</p>
        </div>`;
    }

    function showError(msg) {
      document.getElementById("clinicsGrid").innerHTML = `
        <div class="state-container">
          <span class="state-icon">⚠️</span>
          <h3>Something went wrong</h3>
          <p>${msg}</p>
        </div>`;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    // ── INIT ─────────────────────────────────────────────
    loadClinics();
  </script>
</body>
</html>
