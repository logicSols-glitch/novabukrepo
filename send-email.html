<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./styles-app.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Unbounded:wght@200..900&display=swap"
      rel="stylesheet"
    />
    <title>Check Your Email — NovaBuk</title>
    <style>
      .forgot-cont { background-size: cover; background-repeat: no-repeat; }
      .forgot-box { display: flex; justify-content: center; text-align: center; opacity: 1; height: 100vh; width: 100%; }
      .forgot-input { align-items: center; margin: auto; width: 90%; max-width: 500px; background-color: white; text-align: center; font-family: 'Poppins', sans-serif; border-radius: 30px; padding: 50px; }
      .forgot-logo { justify-content: center; display: flex; align-items: center; gap: 0px; }
      .logo { width: 20%; }
      .login-form { margin-bottom: 20px; }
      .forgot-box label { text-align: left; }
      .forgot-input img, .forgot-input > .form-info h4, .forgot-input > p { padding-bottom: 20px; }
      .forgot-input h4 { padding-top: 10px; }
      .forgot-input > .form-info i { margin: auto; display: flex; justify-content: center; align-items: center; text-align: center; background: #D0EFF4; width: 60px; height: 60px; font-size: 1.5rem; border-radius: 100%; }
      .forgot-input span { color: #3CB1C3; display: block; padding-top: 30px; }
      .forgot-input a { text-decoration: none; justify-content: center; margin-left: 10px; color: #3CB1C3; }
      .email-highlight { font-weight: 600; color: #3CB1C3; }

      @media (max-width: 600px) {
        .forgot-input {
          width: 92% !important;
          padding: 24px 20px !important;
          border-radius: 12px !important;
          margin: 12px auto !important;
        }
        .forgot-box { align-items: flex-start; padding-top: 40px; height: auto; min-height: 100vh; }
        .forgot-logo p { font-size: 16px; }
        .login-form span { padding: 8px 10px; }
      }

    </style>
  </head>
  <body>
    <div class="container-sign forgot-cont">
      <div class="forgot-box">
        <div class="forgot-input">
          <div class="forgot-logo">
            <div class="logo">
              <img src="./images/logo.png" alt="logo" />
            </div>
            <p>NovaBuk</p>
          </div>

          <div class="form-info">
            <i class="fa-solid fa-envelope"></i>
            <h4>Check Your Email</h4>
          </div>

          <p>
            We've sent password reset instructions to<br />
            <span class="email-highlight" id="sentEmail"></span>
          </p>

          <div class="login-form submit">
            <button type="button" id="resendBtn" onclick="resendEmail()">Resend Email</button>
            <p>Didn't receive the email? Check your spam folder or try again.</p>
          </div>

          <span>
            <i class="fa fa-arrow-left"></i>
            <a href="./sign-in.html" id="backToLogin">Back to Sign In</a>
          </span>
        </div>
      </div>
    </div>

    <script>
      //var API_URL = "http://localhost:5000/api";
      var API_URL = "http://localhost:5000/api";

      // Read email and type from URL
      const params = new URLSearchParams(window.location.search);
      const email  = params.get("email") || "your email address";
      const type   = params.get("type")  || "user"; // user, admin, clinic
      
      document.getElementById("sentEmail").textContent = email;

      // Update Back Link
      const backLink = document.getElementById("backToLogin");
      if (type === "admin") {
        backLink.href = "./admin-dashboard.html";
      } else if (type === "clinic") {
        backLink.href = "./clinic-login.html";
      }

      async function resendEmail() {
        const btn = document.getElementById("resendBtn");
        btn.disabled    = true;
        btn.textContent = "Sending...";

        let endpoint = `${API_URL}/users/forgot-password`;
        if (type === "admin") endpoint = `${API_URL}/admin/forgot-password`;
        if (type === "clinic") endpoint = `${API_URL}/clinic-auth/forgot-password`;

        try {
          await fetch(endpoint, {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify({ email }),
          });
          btn.textContent = "Email Sent ✓";
          setTimeout(() => {
            btn.disabled    = false;
            btn.textContent = "Resend Email";
          }, 5000);
        } catch (err) {
          btn.disabled    = false;
          btn.textContent = "Resend Email";
        }
      }
    </script>
  </body>
</html>
