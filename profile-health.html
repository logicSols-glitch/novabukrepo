<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./styles-app.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&family=Unbounded:wght@200..900&display=swap"
      rel="stylesheet"
    />
    <title>Profile — NovaBuk</title>
    <style>
      /* hidden file input for avatar */
      #avatarFileInput { display: none; }

      /* avatar image fills the circle */
      .avatar-logo img {
        width: 100%; height: 100%;
        border-radius: 50%;
        object-fit: cover;
      }
      /* initials fallback */
      .avatar-logo.initials {
        display: flex; align-items: center; justify-content: center;
        font-size: 28px; font-weight: 700;
        color: #35bac9; background: #d0eff4;
        border-radius: 50%;
      }

      /* select styled same as input */
      .detail-form select {
        width: 100%; padding: 12px;
        border-radius: 8px; border: 1px solid #5f5f5f;
        outline: none; font-family: "Poppins", sans-serif;
        font-size: 1rem; margin-top: 8px;
        background: white; appearance: auto;
      }

      /* disabled state for view mode */
      .detail-form input:disabled,
      .detail-form select:disabled {
        background: #f5f5f5; color: #333;
        border-color: #ddd; cursor: default;
      }

      /* tags */
      .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; min-height: 44px; padding: 8px; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9; }
      .tag-list.editable { background: white; border-color: #5f5f5f; }
      .tag-chip { background: #d0eff4; color: #0f2027; padding: 4px 10px; border-radius: 20px; font-size: 13px; display: flex; align-items: center; gap: 6px; }
      .tag-chip .remove-tag { background: none; border: none; cursor: pointer; color: #666; font-size: 14px; padding: 0; line-height: 1; display: none; }
      .editable .tag-chip .remove-tag { display: inline; }
      .tag-text-input { border: none; outline: none; background: transparent; font-family: 'Poppins', sans-serif; font-size: 13px; flex: 1; min-width: 120px; display: none; }
      .editable .tag-text-input { display: inline; }
      .tag-hint { font-size: 11px; color: #999; margin-top: 4px; display: none; }
      .editable + .tag-hint { display: block; }

      /* feedback messages */
      .feedback { font-size: 13px; text-align: center; padding: 8px 12px; border-radius: 6px; margin-bottom: 12px; display: none; }
      .feedback.show { display: block; }
      .feedback.success { color: #276749; background: #f0fff4; border: 1px solid #9ae6b4; }
      .feedback.error   { color: #e53e3e; background: #fff5f5; border: 1px solid #fed7d7; }

      /* avatar upload spinner */
      .avatar-uploading { opacity: 0.5; pointer-events: none; }

      /* ── MOBILE ── */
      @media (max-width: 768px) {
        .container-form > .form-session > .profile-hero { gap: 40px; }
        .avatar { left: 80px !important; }
        .form-session { padding: 10px 16px; }
        .tag-list { min-height: 40px; }
      }
      @media (max-width: 400px) {
        .avatar { left: 40px !important; }
        .container-form > .form-session > .profile-hero { gap: 20px; }
      }
    </style>
  </head>

  <body>
    <div class="container-form">
      <div class="form-session">

        <div class="profile-hero">
          <div class="icon-profile">
            <a href="./app-home.html">&#8592;</a>
          </div>
          <div class="profile-title">
            <p>Profile</p>
          </div>
        </div>

        <p>This helps the clinic understand your situation better</p>

        <!-- Avatar -->
        <div class="profile-avatar">
          <div class="avatar">
            <div class="avatar-logo initials" id="avatarCircle"></div>
            <!-- pencil triggers file pick in edit mode, does nothing in view mode -->
            <div class="avatar-edit" id="avatarEditBtn" onclick="handleAvatarClick()">
              <i class="fa fa-pencil" aria-hidden="true"></i>
            </div>
            <input type="file" id="avatarFileInput" accept="image/*" onchange="uploadAvatar(this)" />
          </div>
          <h5 id="displayName">Full Name</h5>
        </div>

        <div class="feedback" id="feedback"></div>

        <!-- Form — starts disabled (view mode) -->
        <div class="form-input" id="formWrapper">
          <form onsubmit="handleSaveProfile(event)">

            <div class="detail-form">
              <label for="ageRange">Age Range</label>
              <select id="ageRange" disabled>
                <option value="">Select age range</option>
                <option value="Under 18">Under 18</option>
                <option value="18–24">18–24</option>
                <option value="25–34">25–34</option>
                <option value="35–44">35–44</option>
                <option value="45–54">45–54</option>
                <option value="55–64">55–64</option>
                <option value="65+">65+</option>
              </select>
            </div>

            <div class="detail-form">
              <label for="gender">Gender</label>
              <select id="gender" disabled>
                <option value="">Select gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Non-binary">Non-binary</option>
                <option value="Prefer not to say">Prefer not to say</option>
              </select>
            </div>

          </form>

          <!-- Tag inputs OUTSIDE the form so Enter never submits -->
          <div class="detail-form">
            <label>Existing Conditions</label>
            <div class="tag-list" id="conditionsList">
              <input class="tag-text-input" id="conditionsInput" placeholder="Type and press Enter…" />
            </div>
            <p class="tag-hint">e.g. Diabetes, Hypertension, Asthma</p>
          </div>

          <div class="detail-form">
            <label>Allergies</label>
            <div class="tag-list" id="allergiesList">
              <input class="tag-text-input" id="allergiesInput" placeholder="Type and press Enter…" />
            </div>
            <p class="tag-hint">e.g. Penicillin, Peanuts, Dust</p>
          </div>

          <div class="detail-form" id="saveBtnWrapper" style="display:none;">
            <button type="button" id="saveBtn" onclick="handleSaveProfile()">Save & Continue</button>
          </div>
        </div>
      </div>

      <div class="sidebar">
        <img src="./images/profile-logo.png" alt="" />
      </div>
    </div>

    <script>
      const API_URL = "http://localhost:5000/api";
      // const API_URL = "https://novabuk-backend.onrender.com/api";

      // ── AUTH GUARD ──────────────────────────────────────────
      const token = localStorage.getItem("novabuk_token");
      if (!token) window.location.href = "./sign-in.html";

      let isEditing   = false;
      let conditions  = [];
      let allergies   = [];

      // ── AVATAR ─────────────────────────────────────────────
      function setAvatar(src, name) {
        const circle = document.getElementById("avatarCircle");
        if (src) {
          circle.classList.remove("initials");
          circle.innerHTML = `<img src="${src}" alt="avatar" />`;
        } else if (name) {
          const parts    = name.trim().split(" ");
          const initials = parts.length >= 2 ? parts[0][0] + parts[parts.length-1][0] : parts[0][0];
          circle.classList.add("initials");
          circle.textContent = initials.toUpperCase();
        }
      }

      function handleAvatarClick() {
        if (!isEditing) return; // pencil only works in edit mode
        document.getElementById("avatarFileInput").click();
      }

      async function uploadAvatar(input) {
        const file = input.files[0];
        if (!file) return;

        const circle = document.getElementById("avatarCircle");
        circle.classList.add("avatar-uploading");
        showFeedback("Uploading photo…", "success");

        try {
          // Get Cloudinary signature from backend
          const signRes  = await fetch(`${API_URL}/uploads/cloudinary/sign`, {
            method: "POST",
            headers: { Authorization: `Bearer ${token}` },
          });
          const signData = await signRes.json();

          const formData = new FormData();
          formData.append("file", file);
          formData.append("api_key",   signData.api_key);
          formData.append("timestamp", signData.timestamp);
          formData.append("signature", signData.signature);

          const uploadRes  = await fetch(
            `https://api.cloudinary.com/v1_1/${signData.cloud_name}/image/upload`,
            { method: "POST", body: formData }
          );
          const uploadData = await uploadRes.json();

          if (uploadData.secure_url) {
            setAvatar(uploadData.secure_url, null);
            // Save avatar URL to profile
            await fetch(`${API_URL}/users/update`, {
              method:  "PUT",
              headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
              body:    JSON.stringify({ avatarUrl: uploadData.secure_url }),
            });
            showFeedback("Photo updated!", "success");
          }
        } catch (err) {
          showFeedback("Photo upload failed. Try again.", "error");
        } finally {
          circle.classList.remove("avatar-uploading");
          input.value = "";
        }
      }

      // ── TAGS ───────────────────────────────────────────────
      function renderTags(arr, listId, inputId) {
        const list  = document.getElementById(listId);
        const input = document.getElementById(inputId);
        list.innerHTML = "";
        arr.forEach((tag, i) => {
          const chip = document.createElement("span");
          chip.className = "tag-chip";
          chip.innerHTML = `${tag} <button type="button" class="remove-tag" onclick="removeTag('${listId}','${inputId}',${i})">×</button>`;
          list.appendChild(chip);
        });
        list.appendChild(input);
      }

      function removeTag(listId, inputId, index) {
        const arr = listId === "conditionsList" ? conditions : allergies;
        arr.splice(index, 1);
        renderTags(arr, listId, inputId);
      }

      function addTag(listId, inputId) {
        const input = document.getElementById(inputId);
        const value = input.value.trim();
        if (!value) return;
        const arr = listId === "conditionsList" ? conditions : allergies;
        if (!arr.includes(value)) { arr.push(value); renderTags(arr, listId, inputId); }
        input.value = "";
      }

      document.getElementById("conditionsInput").addEventListener("keydown", e => {
        if (e.key === "Enter" || e.key === ",") { e.preventDefault(); addTag("conditionsList", "conditionsInput"); }
      });
      document.getElementById("allergiesInput").addEventListener("keydown", e => {
        if (e.key === "Enter" || e.key === ",") { e.preventDefault(); addTag("allergiesList", "allergiesInput"); }
      });

      // ── EDIT MODE TOGGLE ───────────────────────────────────
      function setEditMode(editing) {
        isEditing = editing;
        document.getElementById("ageRange").disabled = !editing;
        document.getElementById("gender").disabled   = !editing;

        const condList = document.getElementById("conditionsList");
        const algList  = document.getElementById("allergiesList");
        condList.classList.toggle("editable", editing);
        algList.classList.toggle("editable",  editing);

        document.getElementById("saveBtnWrapper").style.display = editing ? "block" : "none";
      }

      // pencil button
      document.getElementById("avatarEditBtn").addEventListener("click", function() {
        if (!isEditing) setEditMode(true);
        // avatar upload handled in handleAvatarClick — only fires if already editing
      });

      // Override: pencil should toggle edit AND open file only when already editing
      // Re-wire avatarEditBtn properly:
      document.getElementById("avatarEditBtn").onclick = function() {
        if (!isEditing) {
          setEditMode(true);
        } else {
          document.getElementById("avatarFileInput").click();
        }
      };

      // ── FEEDBACK ───────────────────────────────────────────
      function showFeedback(msg, type) {
        const el = document.getElementById("feedback");
        el.textContent = msg;
        el.className   = `feedback show ${type}`;
        setTimeout(() => el.classList.remove("show"), 4000);
      }

      // ── LOAD PROFILE FROM API ──────────────────────────────
      async function loadProfile() {
        try {
          const res  = await fetch(`${API_URL}/users/me`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          const data = await res.json();
          if (!data.success) return;

          const u  = data.user;
          const hp = u.healthProfile || {};

          document.getElementById("displayName").textContent = u.fullName || "";
          setAvatar(u.avatarUrl || null, u.fullName);

          if (hp.ageRange) document.getElementById("ageRange").value = hp.ageRange;
          if (hp.gender)   document.getElementById("gender").value   = hp.gender;

          if (hp.existingConditions?.length) {
            conditions = [...hp.existingConditions];
            renderTags(conditions, "conditionsList", "conditionsInput");
          }
          if (hp.allergies?.length) {
            allergies = [...hp.allergies];
            renderTags(allergies, "allergiesList", "allergiesInput");
          }

          // If profile not yet complete, start in edit mode
          if (!u.profileComplete) setEditMode(true);

        } catch (err) {
          console.error("Load profile error:", err);
        }
      }

      loadProfile();

      // ── SAVE ───────────────────────────────────────────────
      async function handleSaveProfile() {
        // Flush any text still in the tag inputs before saving
        addTag("conditionsList", "conditionsInput");
        addTag("allergiesList",  "allergiesInput");
        const btn    = document.getElementById("saveBtn");
        const ageRange = document.getElementById("ageRange").value;
        const gender   = document.getElementById("gender").value;

        btn.disabled    = true;
        btn.textContent = "Saving…";

        try {
          const res  = await fetch(`${API_URL}/users/health-profile`, {
            method:  "PUT",
            headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
            body:    JSON.stringify({ ageRange, gender, existingConditions: conditions, allergies }),
          });
          const data = await res.json();

          if (data.success) {
            localStorage.setItem("novabuk_user", JSON.stringify(data.user));
            showFeedback("Profile saved successfully!", "success");
            btn.textContent = "Save & Continue";
            btn.disabled    = false;
            setEditMode(false); // back to view mode after save
          } else {
            showFeedback(data.message || "Could not save. Try again.", "error");
            btn.disabled    = false;
            btn.textContent = "Save & Continue";
          }
        } catch (err) {
          showFeedback("Network error. Please try again.", "error");
          btn.disabled    = false;
          btn.textContent = "Save & Continue";
        }
      }
    </script>
  </body>
</html>
