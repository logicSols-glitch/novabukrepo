<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./styles-app.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Unbounded:wght@200..900&display=swap"
      rel="stylesheet"
    />
    <title>Reset Password — NovaBuk</title>
    <style>
      .forgot-cont { background-size: cover; background-repeat: no-repeat; }
      .forgot-box { display: flex; justify-content: center; text-align: center; opacity: 1; height: 100vh; width: 100%; }
      .forgot-input { align-items: center; margin: auto; background-color: white; text-align: center; padding: 30px; border-radius: 15px; font-family: 'Poppins', sans-serif; }
      .forgot-logo { justify-content: center; display: flex; align-items: center; gap: 0px; }
      .logo { width: 20%; }
      .login-form { margin-bottom: 20px; }
      .forgot-box label { text-align: left; }
      .forgot-input img, .forgot-input > .form-info h4, .forgot-input > p { padding-bottom: 20px; }
      .forgot-input h4 { padding-top: 20px; }
      .forgot-input > .form-info i { margin: auto; display: flex; justify-content: center; align-items: center; text-align: center; background: #D0EFF4; width: 60px; height: 60px; font-size: 1.5rem; color: rgb(255,255,255); border-radius: 100%; }
      .forgot-input span { color: #3CB1C3; }
      .forgot-input a { text-decoration: none; justify-content: center; margin-left: 10px; color: #3CB1C3; }
      .error-msg { color: #e53e3e; font-size: 13px; margin-top: 8px; display: none; text-align: center; padding: 8px 12px; background: #fff5f5; border-radius: 6px; border: 1px solid #fed7d7; }
      .error-msg.show { display: block; }
      .success-msg { color: #276749; font-size: 13px; margin-top: 8px; display: none; text-align: center; padding: 8px 12px; background: #f0fff4; border-radius: 6px; border: 1px solid #9ae6b4; }
      .success-msg.show { display: block; }
      .submit button:disabled { opacity: 0.6; cursor: not-allowed; }
      .password-wrapper { position: relative; }
      .toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #888; font-size: 14px; }
      .invalid-token { display: none; }
      .invalid-token.show { display: block; }
      .reset-form.hide { display: none; }
    </style>
  </head>
  <body>
    <div class="container-sign forgot-cont">
      <div class="forgot-box">
        <div class="forgot-input">

          <div class="forgot-logo">
            <div class="logo">
              <img src="./images/logo.png" alt="logo" />
            </div>
            <p>NovaBuk</p>
          </div>

          <!-- Invalid / expired token state -->
          <div class="invalid-token" id="invalidToken">
            <div class="form-info">
              <i class="fa-solid fa-circle-xmark" style="background:#fed7d7;color:#e53e3e;"></i>
              <h4>Link Expired</h4>
            </div>
            <p>This reset link is invalid or has expired.<br>Please request a new one.</p>
            <div class="login-form submit">
              <button onclick="window.location.href='./forgot-password.html'">Request New Link</button>
            </div>
            <span>
              <i class="fa fa-arrow-left"></i>
              <a href="./sign-in.html">Back to Sign In</a>
            </span>
          </div>

          <!-- Reset password form -->
          <div class="reset-form" id="resetForm">
            <div class="form-info">
              <i class="fa-solid fa-lock"></i>
              <h4>Set New Password</h4>
            </div>

            <p>Choose a strong password for your NovaBuk account.</p>

            <div class="error-msg"   id="errorMsg"></div>
            <div class="success-msg" id="successMsg"></div>

            <form onsubmit="handleResetPassword(event)">
              <div class="login-form">
                <label for="newPassword">New Password:</label>
                <span class="password-wrapper">
                  <i class="fa fa-lock" aria-hidden="true"></i>
                  <input type="password" id="newPassword" placeholder="At least 6 characters" required minlength="6" />
                  <button type="button" class="toggle-pw" onclick="togglePw('newPassword', this)">
                    <i class="fa fa-eye"></i>
                  </button>
                </span>
              </div>

              <div class="login-form">
                <label for="confirmPassword">Confirm Password:</label>
                <span class="password-wrapper">
                  <i class="fa fa-lock" aria-hidden="true"></i>
                  <input type="password" id="confirmPassword" placeholder="Repeat your password" required minlength="6" />
                  <button type="button" class="toggle-pw" onclick="togglePw('confirmPassword', this)">
                    <i class="fa fa-eye"></i>
                  </button>
                </span>
              </div>

              <div class="login-form submit">
                <button type="submit" id="resetBtn">Reset Password</button>
              </div>
            </form>

            <span>
              <i class="fa fa-arrow-left"></i>
              <a href="./sign-in.html">Back to Sign In</a>
            </span>
          </div>

        </div>
      </div>
    </div>

    <script>
      const API_URL = "http://localhost:5000/api";
      // const API_URL = "https://novabuk-backend.onrender.com/api";

      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get("token");

      if (!token) {
        document.getElementById("resetForm").classList.add("hide");
        document.getElementById("invalidToken").classList.add("show");
      }

      function togglePw(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon  = btn.querySelector("i");
        if (input.type === "password") {
          input.type = "text";
          icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
          input.type = "password";
          icon.classList.replace("fa-eye-slash", "fa-eye");
        }
      }

      async function handleResetPassword(e) {
        e.preventDefault();

        const newPassword     = document.getElementById("newPassword").value;
        const confirmPassword = document.getElementById("confirmPassword").value;
        const btn             = document.getElementById("resetBtn");
        const errMsg          = document.getElementById("errorMsg");
        const successMsg      = document.getElementById("successMsg");

        errMsg.classList.remove("show");
        successMsg.classList.remove("show");

        if (newPassword.length < 6) {
          errMsg.textContent = "Password must be at least 6 characters.";
          errMsg.classList.add("show");
          return;
        }

        if (newPassword !== confirmPassword) {
          errMsg.textContent = "Passwords do not match.";
          errMsg.classList.add("show");
          return;
        }

        btn.disabled    = true;
        btn.textContent = "Resetting...";

        try {
          const res  = await fetch(`${API_URL}/users/reset-password/${token}`, {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify({ password: newPassword }),
          });

          const data = await res.json();

          if (data.success) {
            successMsg.textContent = "Password reset successfully! Redirecting to sign in...";
            successMsg.classList.add("show");
            btn.textContent = "Done!";
            setTimeout(() => {
              window.location.href = "./sign-in.html";
            }, 2000);
          } else {
            if (res.status === 400) {
              document.getElementById("resetForm").classList.add("hide");
              document.getElementById("invalidToken").classList.add("show");
            } else {
              errMsg.textContent = data.message || "Something went wrong. Please try again.";
              errMsg.classList.add("show");
              btn.disabled    = false;
              btn.textContent = "Reset Password";
            }
          }
        } catch (err) {
          errMsg.textContent = "Network error. Please try again.";
          errMsg.classList.add("show");
          btn.disabled    = false;
          btn.textContent = "Reset Password";
        }
      }
    </script>
  </body>
</html>
