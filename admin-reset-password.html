<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./styles-app.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Admin Reset Password — NovaBuk</title>
    <style>
      :root { --primary: #35bac9; }
      body { font-family: 'Poppins', sans-serif; background: #f0f4f8; }
      .forgot-cont { background-size: cover; background-repeat: no-repeat; }
      .forgot-box { display: flex; justify-content: center; text-align: center; opacity: 1; height: 100vh; width: 100%; }
      .forgot-input { align-items: center; margin: auto; background-color: white; text-align: center; padding: 30px; border-radius: 15px; font-family: 'Poppins', sans-serif; }
      .forgot-logo { display: flex; align-items: center;justify-content: center; gap: 10px;}
      .logo { width: 15%; }
      .icon-circle { width: 64px; height: 64px; background: #e8f8fb; color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 20px; }
      h4 { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
      p { font-size: 14px; color: #718096; margin-bottom: 24px; line-height: 1.6; }
      .login-form { margin-bottom: 20px; }
      .forgot-box label { text-align: left; }
      .forgot-input img, .forgot-input > .form-info h4, .forgot-input > p { padding-bottom: 20px; }
      .forgot-input h4 { padding-top: 20px; }
      .forgot-input > .form-info i { margin: auto; display: flex; justify-content: center; align-items: center; text-align: center; background: #D0EFF4; width: 60px; height: 60px; font-size: 1.5rem; color: rgb(255,255,255); border-radius: 100%; }
      /*.forgot-input span { color: #3CB1C3; }*/
      .forgot-input a { text-decoration: none; justify-content: center; margin-left: 10px; color: #3CB1C3; }
      .error-msg { color: #e53e3e; font-size: 13px; margin-top: 8px; display: none; text-align: center; padding: 8px 12px; background: #fff5f5; border-radius: 6px; border: 1px solid #fed7d7; }
      .error-msg { color: #e53e3e; font-size: 13px; margin-bottom: 16px; padding: 10px; background: #fff5f5; border-radius: 8px; border: 1px solid #fed7d7; display: none; }
      .error-msg.show { display: block; }
      .success-msg { color: #2f855a; font-size: 13px; margin-bottom: 16px; padding: 10px; background: #f0fff4; border-radius: 8px; border: 1px solid #c6f6d5; display: none; }
      .success-msg.show { display: block; }
      .state-box { display: none; }
      .state-box.show { display: block; }
    </style>
  </head>
  <body>
    <div class="container-sign forgot-cont">
      <div class="forgot-box">
        <div class="forgot-input">
          <div class="forgot-logo">
            <div class="logo"><img src="./images/logo.png" alt="logo" /></div>
            <p>NovaBuk</p>
          </div>

          <!-- INVALID TOKEN STATE -->
          <div id="invalidTokenState" class="state-box">
            <div class="icon-circle" style="background:#fff5f5; color:#e53e3e;">
              <i class="fa-solid fa-circle-xmark"></i>
            </div>
            <h4>Link Expired</h4>
            <p>This admin reset link is invalid or has expired. Please request a new one.</p>
            <button onclick="window.location.href='./admin-forgot-password.html'">Request New Link</button>
          </div>

          <!-- RESET FORM STATE -->
          <div id="resetFormState" class="state-box">
            <div class="icon-circle">
              <i class="fa-solid fa-lock"></i>
            </div>
            <h4>Set New Admin Password</h4>
            <p>Choose a strong password for your admin account.</p>

            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="successMsg"></div>

            <form onsubmit="handleResetPassword(event)">
              <div class="login-form">
                
                <label for="newPassword">New Password: </label>
                <span class="password-wrapper">
                  <i class="fa fa-lock" aria-hidden="true"></i>
                  <input type="password" id="newPassword" placeholder="At least 6 characters" required minlength="6" />
                  <i class="fa fa-eye toggle-pw" onclick="togglePw('newPassword', this)"></i>
                </span>
                
              </div>

              <div class="login-form">
                <label for="confirmPassword">Confirm Password:</label>
                <span class="password-wrapper">
                  <i class="fa fa-lock" aria-hidden="true"></i>
                  <input type="password" id="confirmPassword" placeholder="Repeat your password" required minlength="6" />
                  <i class="fa fa-eye toggle-pw" onclick="togglePw('confirmPassword', this)"></i>
                </span>
              </div>

              <div class="login-form submit">
                <button type="submit" id="resetBtn">Reset Password</button>
              </div>
            </form>
          </div>

          <a href="./admin-dashboard.html" class="back-link">
            <i class="fa fa-arrow-left"></i> Back to Login
          </a>
        </div>
      </div>
    </div>

    <script>
      var API_URL = "http://localhost:5000/api";
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");

      if (!token) {
        document.getElementById("invalidTokenState").classList.add("show");
      } else {
        document.getElementById("resetFormState").classList.add("show");
      }

      function togglePw(id) {
        const inp = document.getElementById(id);
        const icon = inp.nextElementSibling.querySelector("i");
        if (inp.type === "password") {
          inp.type = "text";
          icon.className = "fa-solid fa-eye-slash";
        } else {
          inp.type = "password";
          icon.className = "fa-solid fa-eye";
        }
      }

      async function handleResetPassword(e) {
        e.preventDefault();
        const p1 = document.getElementById("newPassword").value;
        const p2 = document.getElementById("confirmPassword").value;
        const btn = document.getElementById("resetBtn");
        const errMsg = document.getElementById("errorMsg");
        const successMsg = document.getElementById("successMsg");

        errMsg.classList.remove("show");
        successMsg.classList.remove("show");

        if (p1 !== p2) {
          errMsg.textContent = "Passwords do not match.";
          errMsg.classList.add("show");
          return;
        }

        btn.disabled = true;
        btn.textContent = "Updating...";

        try {
          const res = await fetch(`${API_URL}/admin/reset-password/${token}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: p1 }),
          });

          const data = await res.json();
          if (data.success) {
            successMsg.textContent = "Password updated! Redirecting to login...";
            successMsg.classList.add("show");
            setTimeout(() => { window.location.href = "./admin-dashboard.html"; }, 2000);
          } else {
            errMsg.textContent = data.message || "Reset failed. Link may be expired.";
            errMsg.classList.add("show");
            btn.disabled = false;
            btn.textContent = "Reset Password";
          }
        } catch (err) {
          errMsg.textContent = "Network error. Please try again.";
          errMsg.classList.add("show");
          btn.disabled = false;
          btn.textContent = "Reset Password";
        }
      }
    </script>
  </body>
</html>
