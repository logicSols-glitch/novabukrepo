<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./styles-app.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Staff Reset Password — NovaBuk Clinic</title>
    <style>
      :root { --teal: #35bac9; }
      body { font-family: 'Poppins', sans-serif; background: #f4f7f9; }
      .forgot-box { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
      .forgot-input { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); width: 100%; max-width: 440px; text-align: center; }
      .forgot-logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 30px; }
      .forgot-logo img { height: 32px; }
      .forgot-logo span { font-size: 18px; font-weight: 700; color: #0f2027; }
      .badge { display: inline-block; background: #e8f8fb; color: var(--teal); font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
      .icon-circle { width: 60px; height: 60px; background: #f0f9fa; color: var(--teal); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; margin: 0 auto 20px; }
      h4 { font-size: 22px; font-weight: 700; color: #0f2027; margin-bottom: 10px; }
      p { font-size: 14px; color: #718096; margin-bottom: 28px; line-height: 1.6; }
      .login-form { text-align: left; margin-bottom: 20px; }
      .login-form label { display: block; font-size: 12px; font-weight: 600; color: #4a5568; margin-bottom: 8px; }
      .input-wrap { position: relative; }
      .input-wrap i.icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 14px; }
      .input-wrap input { width: 100%; padding: 12px 14px 12px 40px; border: 1.5px solid #e2e8f0; border-radius: 10px; outline: none; font-family: inherit; font-size: 14px; background: #fafafa; transition: border-color 0.2s; }
      .input-wrap input:focus { border-color: var(--teal); background: white; }
      .toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #aaa; }
      button { width: 100%; padding: 13px; background: linear-gradient(135deg, #7ecad7, var(--teal)); color: white; border: none; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; transition: opacity 0.2s; }
      button:hover { opacity: 0.9; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .back-link { display: inline-flex; align-items: center; gap: 8px; margin-top: 24px; color: var(--teal); text-decoration: none; font-size: 13px; font-weight: 600; }
      .error-msg { color: #e53e3e; font-size: 13px; margin-bottom: 16px; padding: 10px; background: #fff5f5; border-radius: 8px; border: 1px solid #fed7d7; display: none; }
      .error-msg.show { display: block; }
      .success-msg { color: #2f855a; font-size: 13px; margin-bottom: 16px; padding: 10px; background: #f0fff4; border-radius: 8px; border: 1px solid #c6f6d5; display: none; }
      .success-msg.show { display: block; }
      .state-box { display: none; }
      .state-box.show { display: block; }
    </style>
  </head>
  <body>
    <div class="forgot-box">
      <div class="forgot-input">
        <div class="forgot-logo">
          <img src="./images/logo.png" alt="logo" />
          <span>NovaBuk</span>
        </div>
        <span class="badge">Clinic Portal</span>

        <!-- INVALID TOKEN STATE -->
        <div id="invalidTokenState" class="state-box">
          <div class="icon-circle" style="background:#fff5f5; color:#e53e3e;">
            <i class="fa-solid fa-circle-xmark"></i>
          </div>
          <h4>Link Expired</h4>
          <p>This staff reset link is invalid or has expired. Please request a new one from the clinic login page.</p>
          <button onclick="window.location.href='./clinic-forgot-password.html'">Request New Link</button>
        </div>

        <!-- RESET FORM STATE -->
        <div id="resetFormState" class="state-box">
          <div class="icon-circle">
            <i class="fa-solid fa-lock"></i>
          </div>
          <h4>Set New Password</h4>
          <p>Choose a strong password to protect your clinic account.</p>

          <div class="error-msg" id="errorMsg"></div>
          <div class="success-msg" id="successMsg"></div>

          <form onsubmit="handleResetPassword(event)">
            <div class="login-form">
              <label for="newPassword">New Password:</label>
              <div class="input-wrap">
                <i class="fa-solid fa-lock icon"></i>
                <input type="password" id="newPassword" placeholder="Min 6 characters" required minlength="6" />
                <button type="button" class="toggle-pw" onclick="togglePw('newPassword')"><i class="fa-solid fa-eye"></i></button>
              </div>
            </div>
            <div class="login-form">
              <label for="confirmPassword">Confirm Password:</label>
              <div class="input-wrap">
                <i class="fa-solid fa-lock icon"></i>
                <input type="password" id="confirmPassword" placeholder="Repeat password" required minlength="6" />
                <button type="button" class="toggle-pw" onclick="togglePw('confirmPassword')"><i class="fa-solid fa-eye"></i></button>
              </div>
            </div>
            <button type="submit" id="resetBtn">Reset Password</button>
          </form>
        </div>

        <a href="./clinic-login.html" class="back-link">
          <i class="fa-solid fa-arrow-left"></i> Back to Clinic Login
        </a>
      </div>
    </div>

    <script>
      var API_URL = "http://localhost:5000/api";
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");

      if (!token) {
        document.getElementById("invalidTokenState").classList.add("show");
      } else {
        document.getElementById("resetFormState").classList.add("show");
      }

      function togglePw(id) {
        const inp = document.getElementById(id);
        const icon = inp.nextElementSibling.querySelector("i");
        if (inp.type === "password") {
          inp.type = "text";
          icon.className = "fa-solid fa-eye-slash";
        } else {
          inp.type = "password";
          icon.className = "fa-solid fa-eye";
        }
      }

      async function handleResetPassword(e) {
        e.preventDefault();
        const p1 = document.getElementById("newPassword").value;
        const p2 = document.getElementById("confirmPassword").value;
        const btn = document.getElementById("resetBtn");
        const errMsg = document.getElementById("errorMsg");
        const successMsg = document.getElementById("successMsg");

        errMsg.classList.remove("show");
        successMsg.classList.remove("show");

        if (p1 !== p2) {
          errMsg.textContent = "Passwords do not match.";
          errMsg.classList.add("show");
          return;
        }

        btn.disabled = true;
        btn.textContent = "Updating...";

        try {
          const res = await fetch(`${API_URL}/clinic-auth/reset-password/${token}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: p1 }),
          });

          const data = await res.json();
          if (data.success) {
            successMsg.textContent = "Password updated! Redirecting to login...";
            successMsg.classList.add("show");
            setTimeout(() => { window.location.href = "./clinic-login.html"; }, 2000);
          } else {
            errMsg.textContent = data.message || "Reset failed. Link may be expired.";
            errMsg.classList.add("show");
            btn.disabled = false;
            btn.textContent = "Reset Password";
          }
        } catch (err) {
          errMsg.textContent = "Network error. Please try again.";
          errMsg.classList.add("show");
          btn.disabled = false;
          btn.textContent = "Reset Password";
        }
      }
    </script>
  </body>
</html>
